name: Build & Release Plugin

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Package plugin
        run: |
          SLUG="taxonomy-showcase-woocommerce"
          VERSION="${{ github.ref_name }}"
          VERSION_CLEAN="${VERSION}"
          ZIP="${SLUG}-${VERSION}.zip"

          # Copy only production files
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='src/' \
            --exclude='package.json' \
            --exclude='pnpm-lock.yaml' \
            --exclude='plan.md' \
            ./ /tmp/$SLUG/

          # Sync version tag → plugin header & constant
          sed -i "s/Version:           .*/Version:           ${VERSION_CLEAN}/" /tmp/$SLUG/$SLUG.php
          sed -i "s/define( 'WTB_VERSION', '[^']*' )/define( 'WTB_VERSION', '${VERSION_CLEAN}' )/" /tmp/$SLUG/$SLUG.php

          cd /tmp && zip -r "$ZIP" "$SLUG/"
          echo "ZIP=/tmp/$ZIP" >> $GITHUB_ENV

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP }}
          generate_release_notes: true
